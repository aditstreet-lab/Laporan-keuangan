<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Laporan Keuangan Harian</title>
<style>
body{
    font-family: Arial, sans-serif;
    margin:40px;
    background:#f4f4f4;
}
.container{
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,.2);
}
input,select,button{
    padding:8px;
    margin:5px;
}
table{
    width:100%;
    border-collapse:collapse;
    margin-top:20px;
}
table,th,td{
    border:1px solid #ccc;
}
th,td{
    padding:10px;
    text-align:center;
}
.summary{
    margin-top:20px;
    font-size:18px;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="container">
<h2>Laporan Keuangan Harian</h2>

<input type="date" id="tanggal">

<input type="text" id="keterangan" placeholder="Keterangan">

<select id="jenis">
<option value="Pemasukan">Pemasukan</option>
<option value="Pengeluaran">Pengeluaran</option>
</select>

<input type="number" id="nominal" placeholder="Nominal">

<button onclick="tambahData()">Tambah</button>

<table id="tabel">
<thead>
<tr>
<th>No</th>
<th>Tanggal</th>
<th>Keterangan</th>
<th>Jenis</th>
<th>Nominal</th>
</tr>
</thead>

<tbody></tbody>
</table>

<div class="summary">
<p>Total Pemasukan :
Rp <span id="masuk">0</span></p>

<p>Total Pengeluaran :
Rp <span id="keluar">0</span></p>

<p>Saldo :
Rp <span id="saldo">0</span></p>
</div>

</div>

<script>

let data=[];

function formatRupiah(angka){
    return angka.toLocaleString("id-ID");
}

function tambahData(){

let tanggal=document.getElementById("tanggal").value;
let ket=document.getElementById("keterangan").value;
let jenis=document.getElementById("jenis").value;
let nominal=parseFloat(document.getElementById("nominal").value);

if(tanggal=="" || ket=="" || isNaN(nominal)){
    alert("Lengkapi data!");
    return;
}

data.push({
tanggal,
ket,
jenis,
nominal
});

tampil();

document.getElementById("keterangan").value="";
document.getElementById("nominal").value="";
}

function tampil(){

let tbody=document.querySelector("#tabel tbody");
tbody.innerHTML="";

let pemasukan=0;
let pengeluaran=0;

data.forEach((d,i)=>{

tbody.innerHTML +=`
<tr>
<td>${i+1}</td>
<td>${d.tanggal}</td>
<td>${d.ket}</td>
<td>${d.jenis}</td>
<td>Rp ${formatRupiah(d.nominal)}</td>
</tr>
`;

if(d.jenis=="Pemasukan"){
pemasukan+=d.nominal;
}else{
pengeluaran+=d.nominal;
}

});

document.getElementById("masuk").innerHTML=formatRupiah(pemasukan);
document.getElementById("keluar").innerHTML=formatRupiah(pengeluaran);
document.getElementById("saldo").innerHTML=formatRupiah(pemasukan-pengeluaran);

}

</script>

</body>
</html>
